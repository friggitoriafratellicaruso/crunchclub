function assignOutcome(prizes){
  const r=Math.random()*100;let c=0;
  for(const p of prizes){c+=p.probability;if(r<c&&p.remaining>0)return{won:true,prizeName:p.name,prizeId:p.id};}

// ── SHARED UI ─────────────────────────────────────────────────────────────
function Spinner({size=20,color=T.accent}){
  return <div style={{width:size,height:size,border:`2px solid ${T.border}`,borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>;
}

function ArcRing({value,max,size=150,color=T.accent,children}){
  const r=(size/2)-12;
  const circ=2*Math.PI*r;
  const arcLen=circ*.75;
  const filled=arcLen*Math.min(1,value/(max||1));
  return <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}>
    <svg width={size} height={size} style={{transform:"rotate(135deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={10} strokeDasharray={`${arcLen} ${circ}`} strokeLinecap="round"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10} strokeDasharray={`${filled} ${circ-filled}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1s ease"}}/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>
  </div>;
}

function Card({children,style:s,onClick,glow}){

function Tag({text,color}){

// ── CONFETTI ──────────────────────────────────────────────────────────────
function Confetti(){
  const items=Array.from({length:30},(_,i)=>({
    id:i,
    color:[T.accent,T.rose,T.teal,T.purple,"#fff"][i%5],
    left:Math.random()*100,
    delay:Math.random()*1.5,
    duration:2+Math.random()*2,
    size:6+Math.random()*8,
  }));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
    {items.map(c=><div key={c.id} style={{
      position:"absolute",top:-20,left:`${c.left}%`,
      width:c.size,height:c.size,
      background:c.color,borderRadius:c.id%3===0?"50%":"2px",
      animation:`confettiFall ${c.duration}s ${c.delay}s ease-in forwards`,
    }}/>)}
  </div>;
}

// ACQUISTO QR — schermata che si apre scansionando il QR della cassa
// ══════════════════════════════════════════════════════════════════════════
function AcquistoQR({acqId,onDone}){
  const[phase,setPhase]=useState("loading"); // loading|login|done|error|used
  const[acqData,setAcqData]=useState(null);
  const[email,setEmail]=useState("");
  const[nome,setNome]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[result,setResult]=useState(null);

  useEffect(()=>{
    (async()=>{
      const{data,error}=await sb.from("acquisti").select("*").eq("id",acqId).single();
      if(error||!data){setPhase("error");return;}
      if(data.status==="usato"){setPhase("used");setAcqData(data);return;}
      setAcqData(data);setPhase("login");
    })();
  },[acqId]);

  const conferma=async()=>{
    if(!email.trim()){setErr("Inserisci la tua email.");return;}
    setLoading(true);setErr("");
    // Cerca cliente per email
    let{data:cliente}=await sb.from("clienti").select("*").eq("email",email.trim().toLowerCase()).single();
    // Se non esiste, crea nuovo cliente
    if(!cliente){
      if(!nome.trim()){setErr("Email non trovata. Inserisci anche il tuo nome per registrarti.");setLoading(false);return;}
      const{data:newCliente,error}=await sb.from("clienti").insert({
        name:nome.trim(),email:email.trim().toLowerCase(),phone:"",birthday:"",
        segment:"Nuovo",tier:"Bronze",points:0,spent:0,visits:0,
        last_visit:today(),join_date:today(),referrals:0,cashback:0,tags:[],notes:""
      }).select().single();
      if(error){setErr("Errore registrazione: "+error.message);setLoading(false);return;}
      cliente=newCliente;
    }
    // Assegna punti
    const nuoviPunti=cliente.points+acqData.punti;
    const nuovoTier=nuoviPunti>=3000?"Platinum":nuoviPunti>=1500?"Gold":nuoviPunti>=500?"Silver":"Bronze";
    const nuovoSpent=Number(cliente.spent)+Number(acqData.importo);
    await sb.from("clienti").update({
      points:nuoviPunti,tier:nuovoTier,
      spent:nuovoSpent,visits:cliente.visits+1,last_visit:today()
    }).eq("id",cliente.id);
    // Se c\'era un token IW, assegnalo al cliente
    if(acqData.token_iw){
      await sb.from("tokens").update({customer_id:cliente.id}).eq("id",acqData.token_iw);
    }
    // Segna acquisto come usato
    await sb.from("acquisti").update({status:"usato",customer_id:cliente.id,used_at:new Date().toISOString()}).eq("id",acqId);
    setResult({cliente,punti:acqData.punti,hasToken:!!acqData.token_iw,isNew:!cliente.join_date||cliente.join_date===today()});
    setPhase("done");
    setLoading(false);
  };

  if(phase==="loading")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <Spinner size={30}/><div style={{color:T.muted,fontSize:14}}>Verifica QR…</div>
  </div>;

  if(phase==="error")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{textAlign:"center",maxWidth:320}}>
      <div style={{fontSize:48,marginBottom:16}}>❌</div>
      <h2 style={{color:T.text,marginBottom:8}}>QR non valido</h2>
      <p style={{color:T.muted,lineHeight:1.6}}>Questo codice non esiste o è scaduto. Chiedi un nuovo QR al locale.</p>
    </div>
  </div>;

  if(phase==="used")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{textAlign:"center",maxWidth:320}}>
      <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
      <h2 style={{color:T.text,marginBottom:8}}>QR già utilizzato</h2>
      <p style={{color:T.muted,lineHeight:1.6}}>Questo codice è stato già scansionato. Ogni QR è valido una sola volta.</p>
      {onDone&&<button onClick={onDone} style={{marginTop:20,background:T.accent,border:"none",color:"#000",borderRadius:12,padding:"12px 24px",fontWeight:700,cursor:"pointer"}}>Vai all'app →</button>}
    </div>
  </div>;

  if(phase==="done")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    {result?.hasToken&&<Confetti/>}
    <div style={{textAlign:"center",maxWidth:340,width:"100%"}}>
      <div style={{fontSize:52,marginBottom:12}}>🎉</div>
      <h2 style={{color:T.text,fontSize:22,marginBottom:4}}>Punti accreditati!</h2>
      <p style={{color:T.muted,fontSize:14,marginBottom:24}}>Ciao {result?.cliente?.name?.split(" ")[0]}!</p>
      <div style={{background:T.card,borderRadius:16,padding:20,marginBottom:16,border:`1px solid ${T.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${T.border}22`}}>
          <span style={{color:T.muted}}>Punti guadagnati</span>
          <span style={{color:T.accent,fontWeight:800,fontSize:18}}>+{result?.punti} pt</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{color:T.muted}}>Totale punti</span>
          <span style={{color:T.text,fontWeight:700}}>{(result?.cliente?.points+result?.punti).toLocaleString("it-IT")} pt</span>
        </div>
      </div>
      {result?.hasToken&&<div style={{background:"linear-gradient(135deg,#1a1500,#2a1f00)",border:`2px solid ${T.accent}44`,borderRadius:16,padding:20,marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:8}}>🎰</div>
        <div style={{color:T.accent,fontWeight:800,fontSize:16,marginBottom:6}}>Hai un Gratta e Vinci!</div>
        <div style={{color:T.muted,fontSize:13,lineHeight:1.6}}>Vai nella sezione <b style={{color:T.text}}>Gioca</b> dell'app per trovare tutti i tuoi gratta e vinci disponibili.</div>
      </div>}
      {result?.isNew&&<div style={{background:T.teal+"11",border:`1px solid ${T.teal}33`,borderRadius:12,padding:14,marginBottom:16,color:T.teal,fontSize:13}}>
        🌱 Benvenuto nel programma fedeltà! Il tuo account è stato creato automaticamente.
      </div>}
      {onDone
        ?<button onClick={onDone} style={{width:"100%",background:`linear-gradient(135deg,${T.accent},${T.rose})`,border:"none",color:"#000",borderRadius:14,padding:"15px",fontSize:16,fontWeight:800,cursor:"pointer"}}>Vai all'app →</button>
        :<div style={{color:T.dim,fontSize:12,marginTop:8}}>Chiudi questa pagina o accedi all'app per giocare.</div>
      }
    </div>
  </div>;

  // phase === "login"
  return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:64,height:64,margin:"0 auto 16px",background:`linear-gradient(135deg,${T.teal},${T.accent})`,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>🛍️</div>
    <h1 style={{margin:"0 0 4px",fontSize:22,fontWeight:900,color:T.text,textAlign:"center"}}>Registra acquisto</h1>
    <p style={{color:T.muted,fontSize:13,marginBottom:8,textAlign:"center"}}>Inserisci la tua email per ricevere i punti</p>
    <div style={{background:T.card,borderRadius:14,padding:"10px 16px",marginBottom:24,display:"flex",gap:12,alignItems:"center"}}>
      <span style={{color:T.accent,fontWeight:800,fontSize:16}}>€ {Number(acqData?.importo||0).toFixed(2)}</span>
      <span style={{color:T.dim}}>→</span>
      <span style={{color:T.gold,fontWeight:700}}>+{acqData?.punti} punti</span>
      {acqData?.token_iw&&<><span style={{color:T.dim}}>+</span><span style={{color:T.orange,fontWeight:700}}>🎰 Gratta e Vinci</span></>}
    </div>
    <div style={{width:"100%",maxWidth:340}}>
      <label style={{color:T.muted,fontSize:12,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>La tua email</label>
      <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&conferma()} placeholder="mario@email.it"
        style={{width:"100%",background:T.surface,color:T.text,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 16px",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>
      {err&&err.includes("nome")&&<>
        <label style={{color:T.muted,fontSize:12,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Il tuo nome (per registrarti)</label>
        <input type="text" value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario Rossi"
          style={{width:"100%",background:T.surface,color:T.text,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 16px",fontSize:16,marginBottom:12,boxSizing:"border-box"}}/>
      </>}
      {err&&<div style={{color:T.rose,fontSize:13,marginBottom:12,textAlign:"center"}}>{err}</div>}
      <button onClick={conferma} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${T.teal},${T.accent})`,border:"none",color:"#000",borderRadius:14,padding:"15px",fontSize:16,fontWeight:800,cursor:"pointer",opacity:loading?.7:1}}>
        {loading?<Spinner size={18} color="#000"/>:"Conferma e ricevi punti →"}
      </button>
      <p style={{color:T.dim,fontSize:12,marginTop:14,textAlign:"center",lineHeight:1.6}}>Non sei iscritto? Inserisci la tua email e il nome — ti registriamo automaticamente.</p>
    </div>
  </div>;
}

// LOGIN
// ══════════════════════════════════════════════════════════════════════════
function Login({onLogin}){
  const[email,setEmail]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const login=async()=>{
    if(!email.trim()){setErr("Inserisci la tua email.");return;}
    setLoading(true);setErr("");
    const{data,error}=await sb.from("clienti").select("*").eq("email",email.trim().toLowerCase()).single();
    if(error||!data){setErr("Email non trovata. Chiedi al locale di iscriverti.");setLoading(false);return;}
    onLogin(data);
    setLoading(false);
  };

  return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:74,height:74,margin:"0 auto 18px",background:`linear-gradient(135deg,${T.accent},${T.rose})`,borderRadius:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:`0 10px 30px ${T.accent}44`}}>🏆</div>
    <h1 style={{margin:"0 0 6px",fontSize:26,fontWeight:900,color:T.text,textAlign:"center"}}>FideltàPro</h1>
    <p style={{color:T.muted,fontSize:14,marginBottom:36,textAlign:"center"}}>Il tuo programma fedeltà</p>
    <div style={{width:"100%",maxWidth:340}}>
      <label style={{color:T.muted,fontSize:12,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>La tua email</label>
      <input
        type="email"
        value={email}
        onChange={e=>setEmail(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&login()}
        placeholder="mario@email.it"
        style={{width:"100%",background:T.card,color:T.text,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 18px",fontSize:16,marginBottom:12,boxSizing:"border-box"}}
      />
      {err&&<div style={{color:T.rose,fontSize:13,marginBottom:12,textAlign:"center"}}>{err}</div>}
      <button onClick={login} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${T.accent},${T.rose})`,border:"none",color:"#000",borderRadius:14,padding:"15px",fontSize:16,fontWeight:800,cursor:"pointer",opacity:loading?.7:1}}>
        {loading?<Spinner size={18} color="#000"/>:"Accedi →"}
      </button>
    </div>
    <p style={{color:T.dim,fontSize:12,marginTop:24,textAlign:"center"}}>Non sei ancora iscritto?<br/>Chiedi al locale di registrarti.</p>
  </div>;
}

// INSTANT WIN — schermata di gioco (da URL con token)
// ══════════════════════════════════════════════════════════════════════════
function GiocaToken({token,customer,onBack}){
  const[phase,setPhase]=useState("loading"); // loading|welcome|play|result|used|notfound
  const[tokenData,setTokenData]=useState(null);
  const[campaign,setCampaign]=useState(null);
  const[result,setResult]=useState(null);
  const[scratchPct,setScratchPct]=useState(0);
  const[scratched,setScratched]=useState(false);
  const[confetti,setConfetti]=useState(false);

  useEffect(()=>{
    if(!token){setPhase("notfound");return;}
    (async()=>{
      const{data:tk}=await sb.from("tokens").select("*").eq("token",token).single();
      if(!tk){setPhase("notfound");return;}
      if(tk.status!=="Non giocato"){setTokenData(tk);setPhase("used");return;}
      const{data:camp}=await sb.from("campagne").select("*").eq("id",tk.campaign_id).single();
      if(!camp||!camp.active){setPhase("notfound");return;}
      setTokenData(tk);
      setCampaign({...camp,prizes:typeof camp.prizes==="string"?JSON.parse(camp.prizes):camp.prizes});
      setPhase("welcome");
    })();
  },[token]);

  const play=async()=>{
    setPhase("play");
    const prizes=campaign.prizes;
    const stats=typeof campaign.stats==="string"?JSON.parse(campaign.stats):campaign.stats;
    const outcome=assignOutcome(prizes);
    // Save result to DB
    await sb.from("tokens").update({status:outcome.won?"Vinto":"Non vinto",won:outcome.won,prize_name:outcome.prizeName,played_at:today()}).eq("token",token);
    let updPrizes=prizes;
    if(outcome.won)updPrizes=prizes.map(p=>p.id===outcome.prizeId?{...p,remaining:Math.max(0,p.remaining-1)}:p);
    await sb.from("campagne").update({prizes:JSON.stringify(updPrizes),stats:JSON.stringify({...stats,played:stats.played+1,won:stats.won+(outcome.won?1:0)})}).eq("id",campaign.id);
    setResult(outcome);
  };

  const doScratch=()=>{
    if(scratched)return;
    let p=0;
    const iv=setInterval(()=>{p=Math.min(100,p+9);setScratchPct(p);if(p>=100){clearInterval(iv);setScratched(true);if(result?.won)setConfetti(true);}},25);
  };

  if(phase==="loading")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>

      <div style={{width:68,height:68,margin:"0 auto 12px",background:`linear-gradient(135deg,${T.accent},${T.rose})`,borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,boxShadow:`0 10px 30px ${T.accent}44`}}>🏆</div>

      <p style={{color:T.muted,fontSize:13,marginTop:4}}>Instant Win — {campaign?.name}</p>
    </div>

    {phase==="welcome"&&<div style={{width:"100%",maxWidth:340}}>
      <Card style={{padding:22,marginBottom:16}}>
        <div style={{fontSize:40,textAlign:"center",marginBottom:10}}>🎰</div>

        <p style={{color:T.muted,fontSize:13,lineHeight:1.6,textAlign:"center",marginBottom:12}}>Grazie per il tuo acquisto. Scopri subito se hai vinto!</p>
        <div style={{background:T.border+"44",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
          <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",marginBottom:4}}>Token</div>
          <div style={{fontFamily:"monospace",color:T.accent,fontSize:13,fontWeight:700,letterSpacing:1,wordBreak:"break-all"}}>{token}</div>
        </div>
      </Card>
      <Card style={{padding:18,marginBottom:16}}>
        <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Premi in palio</div>
        {campaign?.prizes.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${T.border}33`}}>
          <span style={{color:T.text,fontSize:13}}>{p.name}</span>
          <span style={{color:T.accent,fontSize:12,fontWeight:700}}>{p.probability}%</span>

        <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0"}}>

        🎰 Gioca ora!
      </button>
      {onBack&&<button onClick={onBack} style={{marginTop:10,width:"100%",background:"none",border:`1px solid ${T.border}`,color:T.muted,borderRadius:12,padding:"11px",fontSize:14,cursor:"pointer"}}>← Torna all'app</button>}
    </div>}

    {phase==="play"&&<div style={{textAlign:"center",maxWidth:340,width:"100%"}}>
      {!result?<><Spinner size={40}/><p style={{color:T.muted,marginTop:16}}>Estrazione in corso…</p></>

        <p style={{color:T.muted,marginBottom:20,fontSize:13}}>Gratta per scoprire il risultato!</p>

          {/* Result underneath */}
          <div style={{position:"absolute",inset:0,borderRadius:20,background:result.won?"linear-gradient(135deg,#0a2010,#082008)":"linear-gradient(135deg,#1f0a0a,#2a0d0d)",border:`2px solid ${result.won?T.green:T.rose}33`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10}}>
            {result.won
              ?<><div style={{fontSize:40}}>🏆</div><div style={{color:T.green,fontWeight:900,fontSize:20}}>VINTO!</div><div style={{color:T.text,fontSize:15,fontWeight:600}}>{result.prizeName}</div><div style={{color:T.muted,fontSize:12,marginTop:4}}>Mostra questa schermata al locale</div></>
              :<><div style={{fontSize:40}}>😔</div><div style={{color:T.rose,fontWeight:700,fontSize:18}}>Non vinto</div><div style={{color:T.muted,fontSize:13,marginTop:4}}>Ritenta al prossimo acquisto!</div></>
            }
          </div>
          {/* Scratch layer */}
          {!scratched&&<div style={{position:"absolute",inset:0,borderRadius:20,background:`repeating-linear-gradient(45deg,${T.accent}CC,${T.accent}CC 14px,${T.accent}99 14px,${T.accent}99 28px)`,clipPath:`inset(0 ${scratchPct}% 0 0 round 20px)`,border:`2px solid ${T.accent}`,display:"flex",alignItems:"center",justifyContent:"center"}}>

        </>}
      </div>}
    </div>}
  </div>;
}

          <span style={{color:T.text,fontSize:13,fontWeight:600}}>{v}</span>
        </div>)}
        <button onClick={onLogout} style={{marginTop:24,width:"100%",background:"none",border:`1px solid ${T.rose}44`,color:T.rose,borderRadius:12,padding:"12px",cursor:"pointer",fontWeight:600,fontSize:14}}>
          Esci dall'account
        </button>
      </div>}
    </div>
  </div>;
}

// ══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════
function App(){
  const[customer,setCustomer]=useState(null);
  const[tab,setTab]=useState("home");
  const[playToken,setPlayToken]=useState(URL_TOKEN||null);
  const[loading,setLoading]=useState(true);

  // Check session
  useEffect(()=>{
    const saved=sessionStorage.getItem("flp_customer");
    if(saved)try{setCustomer(JSON.parse(saved));}catch{}
    setLoading(false);
  },[]);

  const login=(c)=>{
    setCustomer(c);
    sessionStorage.setItem("flp_customer",JSON.stringify(c));
  };

  const logout=()=>{
    setCustomer(null);
    sessionStorage.removeItem("flp_customer");
    setPlayToken(null);
  };

  if(loading)return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner size={30}/></div>;

  // Se c'è un QR acquisto in URL — mostra schermata acquisto
  if(URL_ACQ){
    return <AcquistoQR acqId={URL_ACQ} onDone={customer?()=>{window.location.href=window.location.pathname}:null}/>;
  }

  // Se c'è un token in URL e non è loggato — mostra gioco direttamente
  if(URL_TOKEN&&!customer){
    return <GiocaToken token={URL_TOKEN} customer={null} onBack={()=>window.history.back()}/>;
  }

  if(!customer)return <Login onLogin={login}/>;

  // Se sta giocando un token
  if(playToken)return <GiocaToken
    token={playToken}
    customer={customer}
    onBack={()=>{setPlayToken(null);setTab("home");}}
  />;

  return <div style={{minHeight:"100vh",background:T.bg,maxWidth:430,margin:"0 auto",position:"relative"}}>
    <div style={{paddingTop:0,overflowX:"hidden"}}>
      {tab==="home"   &&<Home     customer={customer} onPlayToken={t=>t?setPlayToken(t):setTab("gioca")}/>}
      {tab==="rewards"&&<Rewards  customer={customer}/>}
      {tab==="gioca"  &&<GiocaPage customer={customer} onPlay={t=>setPlayToken(t)}/>}
      {tab==="profile"&&<Profile  customer={customer} onLogout={logout}/>}
    </div>
    <BottomNav active={tab} onChange={setTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
